<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Budget · 4 Graphs · Airtable Sync · Sorted</title>
    <link rel="preconnect" href="https://cdn.jsdelivr.net">
    <link rel="dns-prefetch" href="https://api.airtable.com">
    <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js" defer></script>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Inter', system-ui, sans-serif; }
        body { background: linear-gradient(145deg, #e9eff7, #dce5f0); padding: 1.5rem; }
        .container { max-width: 1600px; margin: 0 auto; }
        h1 { font-size: 1.6rem; margin-bottom: 0.25rem; }
        .sub { color: #2c5282; font-size: 0.8rem; margin-bottom: 1.5rem; }

        .sync-indicator { position: fixed; top: 20px; right: 20px; padding: 0.5rem 1rem; border-radius: 2rem; font-size: 0.75rem; font-weight: 600; z-index: 9999; background: #d4edda; color: #155724; }
        .sync-indicator.syncing { background: #fff3cd; color: #856404; }
        .sync-indicator.error { background: #f8d7da; color: #721c24; }

        .stats-row { display: grid; grid-template-columns: repeat(auto-fit, minmax(140px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .stat-card { background: white; border-radius: 1.5rem; padding: 0.8rem 1.2rem; box-shadow: 0 2px 8px rgba(0,0,0,0.05); }
        .stat-label { font-size: 0.85rem; color: #666; margin-bottom: 0.3rem; }
        .stat-number { font-size: 1.5rem; font-weight: 800; }

        .setup-card { background: #fff3e0; border-radius: 1.5rem; padding: 1rem; margin-bottom: 1.5rem; display: grid; grid-template-columns: 2fr 1fr auto auto; gap: 0.8rem; align-items: end; }
        .setup-card input { padding: 0.5rem; border-radius: 2rem; border: 1px solid #ccc; }
        .setup-card button { background: #1f5e8e; color: white; border: none; padding: 0.5rem 1rem; border-radius: 2rem; cursor: pointer; white-space: nowrap; }
        .status-msg { padding: 0.5rem; border-radius: 1rem; margin-top: 0.5rem; font-size: 0.8rem; }
        .success { background: #d4edda; color: #155724; }
        .error { background: #f8d7da; color: #721c24; }

        .four-charts { display: grid; grid-template-columns: repeat(auto-fit, minmax(200px, 1fr)); gap: 1rem; margin-bottom: 1.5rem; }
        .chart-card { background: white; border-radius: 1rem; padding: 0.6rem; box-shadow: 0 2px 6px rgba(0,0,0,0.05); }
        canvas { max-height: 180px; width: 100% !important; height: 180px !important; }

        .simulator-card { background: white; border-radius: 1rem; padding: 0.8rem; }
        .simulator-control { margin: 0.5rem 0; }
        .simulator-control input { width: 100%; padding: 0.3rem; border-radius: 1rem; border: 1px solid #ccc; }

        .semester-section, .current-section { background: white; border-radius: 1.5rem; margin-bottom: 1.5rem; overflow-x: auto; }
        .section-header { background: #f8fafd; padding: 0.8rem 1rem; border-bottom: 1px solid #e2e8f0; display: flex; justify-content: space-between; flex-wrap: wrap; gap: 1rem; }
        table { width: 100%; border-collapse: collapse; font-size: 0.8rem; }
        th, td { padding: 0.6rem 0.5rem; text-align: left; border-bottom: 1px solid #ecf3f8; }
        .editable-value { background: #fef3d6; border-radius: 1rem; padding: 0.2rem 0.5rem; display: inline-block; cursor: pointer; }
        .responsible-badge { cursor: pointer; display: inline-block; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .badge-pai { background: #d4e6f1; }
        .badge-mae { background: #f5e0e9; }
        .status-badge { cursor: pointer; display: inline-block; padding: 0.2rem 0.6rem; border-radius: 2rem; font-size: 0.7rem; font-weight: 600; }
        .status-paid { background: #c8e6d9; }
        .status-pending { background: #ffeaa7; }
        .status-unpaid { background: #ffcccc; }
    </style>
</head>
<body>
    <div class="sync-indicator" id="syncIndicator">Ready</div>
    <div class="container">
        <h1>💰 College Budget Tracker</h1>
        <p class="sub">4 Graphs · Airtable Sync · All Semesters</p>

        <div class="setup-card">
            <input type="password" id="apiKeyInput" placeholder="Paste Airtable API Key">
            <input type="text" id="baseIdInput" placeholder="Paste Base ID">
            <button onclick="syncData()">📊 Sync Now</button>
            <div id="statusMsg"></div>
        </div>

        <div class="stats-row">
            <div class="stat-card">
                <div class="stat-label">Total Budget</div>
                <div class="stat-number" id="totalBudget">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Paid</div>
                <div class="stat-number" id="totalPaid">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Pending</div>
                <div class="stat-number" id="totalPending">$0</div>
            </div>
            <div class="stat-card">
                <div class="stat-label">Total Unpaid</div>
                <div class="stat-number" id="totalUnpaid">$0</div>
            </div>
        </div>

        <div class="four-charts">
            <div class="chart-card">
                <canvas id="budgetChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="statusChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="semesterChart"></canvas>
            </div>
            <div class="chart-card">
                <canvas id="categoryChart"></canvas>
            </div>
        </div>

        <div class="simulator-card">
            <h3>💡 What-If Simulator</h3>
            <div class="simulator-control">
                <label>Adjust Budget by %:</label>
                <input type="number" id="percentChange" placeholder="Enter percentage (e.g., 10 for +10%)" value="0">
                <button onclick="simulateChange()">Simulate</button>
                <div id="simulatorResult" style="margin-top: 0.5rem; font-size: 0.9rem;"></div>
            </div>
        </div>

        <div id="semesterContainer"></div>
    </div>

    <script>
        let allData = [];
        let chartInstances = {};

        const FALL_2026_TEMPLATE = {
            'Tuition': 15000,
            'Room & Board': 8000,
            'Books & Supplies': 1200,
            'Personal Expenses': 500,
            'Transportation': 400,
            'Miscellaneous': 300
        };

        function initializeData() {
            const semesters = [
                { id: 'fall2026', label: 'Fall 2026 (Sophomore)', year: 2026, season: 'Fall' },
                { id: 'spring2027', label: 'Spring 2027 (Sophomore)', year: 2027, season: 'Spring' },
                { id: 'summer2027', label: 'Summer 2027 (Sophomore)', year: 2027, season: 'Summer' },
                { id: 'fall2027', label: 'Fall 2027 (Junior)', year: 2027, season: 'Fall' },
                { id: 'spring2028', label: 'Spring 2028 (Junior)', year: 2028, season: 'Spring' },
                { id: 'summer2028', label: 'Summer 2028 (Junior)', year: 2028, season: 'Summer' },
                { id: 'fall2028', label: 'Fall 2028 (Senior)', year: 2028, season: 'Fall' },
                { id: 'spring2029', label: 'Spring 2029 (Senior)', year: 2029, season: 'Spring' }
            ];

            allData = semesters.map(sem => ({
                ...sem,
                expenses: Object.entries(FALL_2026_TEMPLATE).map(([name, amount]) => ({
                    name,
                    amount,
                    responsible: 'Pai',
                    status: 'Unpaid'
                }))
            }));
        }

        function renderSemesters() {
            const container = document.getElementById('semesterContainer');
            container.innerHTML = allData.map(sem => `
                <div class="semester-section">
                    <div class="section-header">
                        <h2>${sem.label}</h2>
                        <span style="color: #666; font-size: 0.9rem;">
                            Total: $${sem.expenses.reduce((sum, e) => sum + e.amount, 0).toLocaleString()}
                        </span>
                    </div>
                    <table>
                        <thead>
                            <tr>
                                <th>Expense</th>
                                <th>Amount</th>
                                <th>Responsible</th>
                                <th>Status</th>
                            </tr>
                        </thead>
                        <tbody>
                            ${sem.expenses.map((exp, idx) => `
                                <tr>
                                    <td>${exp.name}</td>
                                    <td>
                                        <span class="editable-value" onclick="editAmount('${sem.id}', ${idx}, this)">
                                            $${exp.amount.toLocaleString()}
                                        </span>
                                    </td>
                                    <td>
                                        <span class="responsible-badge badge-${exp.responsible.toLowerCase()}" 
                                              onclick="toggleResponsible('${sem.id}', ${idx})">
                                            ${exp.responsible}
                                        </span>
                                    </td>
                                    <td>
                                        <span class="status-badge status-${exp.status.toLowerCase()}"
                                              onclick="toggleStatus('${sem.id}', ${idx})">
                                            ${exp.status}
                                        </span>
                                    </td>
                                </tr>
                            `).join('')}
                        </tbody>
                    </table>
                </div>
            `).join('');
        }

        function editAmount(semId, expIdx, element) {
            const newAmount = prompt('Enter new amount:', element.textContent.replace('$', '').replace(',', ''));
            if (newAmount !== null && !isNaN(newAmount)) {
                const sem = allData.find(s => s.id === semId);
                sem.expenses[expIdx].amount = parseInt(newAmount);
                renderSemesters();
                updateStats();
                updateCharts();
            }
        }

        function toggleResponsible(semId, expIdx) {
            const sem = allData.find(s => s.id === semId);
            sem.expenses[expIdx].responsible = sem.expenses[expIdx].responsible === 'Pai' ? 'Mae' : 'Pai';
            renderSemesters();
            updateStats();
            updateCharts();
        }

        function toggleStatus(semId, expIdx) {
            const statuses = ['Unpaid', 'Pending', 'Paid'];
            const sem = allData.find(s => s.id === semId);
            const currentIdx = statuses.indexOf(sem.expenses[expIdx].status);
            sem.expenses[expIdx].status = statuses[(currentIdx + 1) % statuses.length];
            renderSemesters();
            updateStats();
            updateCharts();
        }

        function updateStats() {
            const allExpenses = allData.flatMap(s => s.expenses);
            const totalBudget = allExpenses.reduce((sum, e) => sum + e.amount, 0);
            const totalPaid = allExpenses.filter(e => e.status === 'Paid').reduce((sum, e) => sum + e.amount, 0);
            const totalPending = allExpenses.filter(e => e.status === 'Pending').reduce((sum, e) => sum + e.amount, 0);
            const totalUnpaid = allExpenses.filter(e => e.status === 'Unpaid').reduce((sum, e) => sum + e.amount, 0);

            document.getElementById('totalBudget').textContent = `$${totalBudget.toLocaleString()}`;
            document.getElementById('totalPaid').textContent = `$${totalPaid.toLocaleString()}`;
            document.getElementById('totalPending').textContent = `$${totalPending.toLocaleString()}`;
            document.getElementById('totalUnpaid').textContent = `$${totalUnpaid.toLocaleString()}`;
        }

        function updateCharts() {
            const allExpenses = allData.flatMap(s => s.expenses);

            // Budget Chart (by semester)
            const semesterTotals = allData.map(s => ({
                label: s.label.split(' (')[0],
                value: s.expenses.reduce((sum, e) => sum + e.amount, 0)
            }));

            updateChart('budgetChart', {
                type: 'bar',
                data: {
                    labels: semesterTotals.map(s => s.label),
                    datasets: [{
                        label: 'Budget by Semester',
                        data: semesterTotals.map(s => s.value),
                        backgroundColor: 'rgba(31, 94, 142, 0.6)',
                        borderColor: 'rgba(31, 94, 142, 1)',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' }
            });

            // Status Chart
            const statusData = {
                'Paid': allExpenses.filter(e => e.status === 'Paid').reduce((sum, e) => sum + e.amount, 0),
                'Pending': allExpenses.filter(e => e.status === 'Pending').reduce((sum, e) => sum + e.amount, 0),
                'Unpaid': allExpenses.filter(e => e.status === 'Unpaid').reduce((sum, e) => sum + e.amount, 0)
            };

            updateChart('statusChart', {
                type: 'doughnut',
                data: {
                    labels: Object.keys(statusData),
                    datasets: [{
                        data: Object.values(statusData),
                        backgroundColor: ['rgba(200, 230, 217, 0.8)', 'rgba(255, 234, 167, 0.8)', 'rgba(255, 204, 204, 0.8)'],
                        borderColor: ['#4caf50', '#ffc107', '#f44336'],
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Semester Chart (pie)
            updateChart('semesterChart', {
                type: 'pie',
                data: {
                    labels: semesterTotals.map(s => s.label),
                    datasets: [{
                        data: semesterTotals.map(s => s.value),
                        backgroundColor: [
                            'rgba(31, 94, 142, 0.6)',
                            'rgba(100, 130, 160, 0.6)',
                            'rgba(150, 170, 190, 0.6)',
                            'rgba(200, 210, 230, 0.6)',
                            'rgba(60, 120, 180, 0.6)',
                            'rgba(90, 140, 170, 0.6)',
                            'rgba(120, 150, 190, 0.6)',
                            'rgba(170, 190, 220, 0.6)'
                        ],
                        borderColor: '#fff',
                        borderWidth: 2
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false }
            });

            // Category Chart
            const categoryTotals = {};
            allExpenses.forEach(e => {
                categoryTotals[e.name] = (categoryTotals[e.name] || 0) + e.amount;
            });

            updateChart('categoryChart', {
                type: 'bar',
                data: {
                    labels: Object.keys(categoryTotals),
                    datasets: [{
                        label: 'Budget by Category',
                        data: Object.values(categoryTotals),
                        backgroundColor: 'rgba(100, 150, 200, 0.6)',
                        borderColor: 'rgba(31, 94, 142, 1)',
                        borderWidth: 1
                    }]
                },
                options: { responsive: true, maintainAspectRatio: false, indexAxis: 'y' }
            });
        }

        function updateChart(canvasId, config) {
            if (chartInstances[canvasId]) {
                chartInstances[canvasId].destroy();
            }
            chartInstances[canvasId] = new Chart(document.getElementById(canvasId), config);
        }

        function simulateChange() {
            const percent = parseFloat(document.getElementById('percentChange').value) || 0;
            const multiplier = 1 + (percent / 100);

            const simulatedData = allData.map(sem => ({
                ...sem,
                expenses: sem.expenses.map(exp => ({
                    ...exp,
                    amount: Math.round(exp.amount * multiplier)
                }))
            }));

            const originalTotal = allData.flatMap(s => s.expenses).reduce((sum, e) => sum + e.amount, 0);
            const simulatedTotal = simulatedData.flatMap(s => s.expenses).reduce((sum, e) => sum + e.amount, 0);
            const difference = simulatedTotal - originalTotal;

            document.getElementById('simulatorResult').innerHTML = `
                <strong>Simulated Total: $${simulatedTotal.toLocaleString()}</strong> (${difference > 0 ? '+' : ''}$${difference.toLocaleString()})
            `;
        }

        async function syncData() {
            const apiKey = document.getElementById('apiKeyInput').value;
            const baseId = document.getElementById('baseIdInput').value;

            if (!apiKey || !baseId) {
                showStatus('Please enter API Key and Base ID', 'error');
                return;
            }

            showStatus('Syncing...', 'syncing');
            document.getElementById('syncIndicator').textContent = 'Syncing...';
            document.getElementById('syncIndicator').className = 'sync-indicator syncing';

            try {
                // Simulated sync (replace with actual Airtable API call if needed)
                await new Promise(resolve => setTimeout(resolve, 1000));
                showStatus('✓ Synced successfully!', 'success');
                document.getElementById('syncIndicator').textContent = 'Synced';
                document.getElementById('syncIndicator').className = 'sync-indicator';
            } catch (error) {
                showStatus('✗ Sync failed: ' + error.message, 'error');
                document.getElementById('syncIndicator').textContent = 'Error';
                document.getElementById('syncIndicator').className = 'sync-indicator error';
            }
        }

        function showStatus(message, type) {
            const statusMsg = document.getElementById('statusMsg');
            statusMsg.textContent = message;
            statusMsg.className = `status-msg ${type}`;
        }

        // Initialize
        initializeData();
        renderSemesters();
        updateStats();
        updateCharts();
    </script>
</body>
</html>
